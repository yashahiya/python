{% extends 'user_app/base.html' %}

{% block title %}Forgot Password - FirstPortal{% endblock %}

{% block content %}
<div class="w-full max-w-md animate-slide-in">
    <div class="backdrop-blur-md bg-white border border-slate-200/80 rounded-3xl p-8 shadow-xl shadow-slate-200/50">
        <!-- Header -->
        <div class="text-center mb-8">
            <h2 class="font-outfit font-extrabold text-3xl text-slate-900 tracking-tight">Recover Password</h2>
            <p class="text-slate-500 mt-2 text-sm font-medium">Enter your registered email to receive a password recovery OTP code.</p>
        </div>

        <!-- Forgot Password Form -->
        <form method="POST" action="{% url 'user_app:forgot_password' %}" class="space-y-5">
            {% csrf_token %}
            
            <!-- Email Input -->
            <div class="space-y-1.5">
                <label for="email" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Email Address</label>
                <div class="relative rounded-xl shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                        </svg>
                    </div>
                    <input type="email" name="email" id="email" required placeholder="john@example.com"
                        class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-450 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all duration-200 sm:text-sm font-medium">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full mt-2 py-3 px-4 bg-gradient-to-r from-indigo-500 to-violet-500 hover:from-indigo-600 hover:to-violet-600 text-white rounded-xl text-sm font-semibold tracking-wide shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/30 transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500/40">
                Send Recovery OTP
            </button>
        </form>

        <!-- Redirect to Login -->
        <div class="mt-6 pt-5 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-500 font-medium">
                Remembered your password? 
                <a href="{% url 'user_app:login' %}" class="text-indigo-600 font-semibold hover:text-indigo-700 transition-colors duration-150">
                    Sign in here
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
