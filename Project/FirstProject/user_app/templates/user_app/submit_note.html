{% extends 'user_app/base.html' %}

{% block title %}Submit Note - FirstPortal{% endblock %}

{% block content %}
<div class="w-full max-w-lg animate-slide-in">
    <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-xl shadow-slate-200/50">
        <!-- Header -->
        <div class="mb-8">
            <a href="{% url 'user_app:dashboard' %}" class="inline-flex items-center space-x-1.5 text-xs font-semibold text-slate-500 hover:text-indigo-600 transition-colors duration-150 mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                <span>Back to Dashboard</span>
            </a>
            <h2 class="font-outfit font-extrabold text-3xl text-slate-900 tracking-tight">Submit New Note</h2>
            <p class="text-slate-500 mt-1.5 text-sm font-medium">Upload notes with files and description for admin review.</p>
        </div>

        <!-- Submission Form -->
        <form method="POST" action="{% url 'user_app:submit_note' %}" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <!-- Note Title -->
            <div class="space-y-1.5">
                <label for="title" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Note Title</label>
                <input type="text" name="title" id="title" required placeholder="e.g. Physics Core Concepts - Sem 1"
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all duration-200 sm:text-sm font-medium">
            </div>

            <!-- Category -->
            <div class="space-y-1.5">
                <label for="category" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Category</label>
                <input type="text" name="category" id="category" required placeholder="e.g. Science, Mathematics, History, Work"
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all duration-200 sm:text-sm font-medium">
            </div>

            <!-- Note Description -->
            <div class="space-y-1.5">
                <label for="description" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Description</label>
                <textarea name="description" id="description" rows="4" required placeholder="Provide a summary or key highlights of your note..."
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all duration-200 sm:text-sm font-medium"></textarea>
            </div>

            <!-- File Upload -->
            <div class="space-y-2">
                <label for="file" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Attachment File (Optional)</label>
                <div class="flex items-center justify-center w-full">
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-200 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100/50 hover:border-slate-350 transition-colors duration-150">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8 text-slate-400 mb-2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
                            </svg>
                            <p class="mb-1 text-xs text-slate-500 font-semibold">Click to upload document or file</p>
                            <p class="text-[10px] text-slate-400">PDF, PNG, JPG, DOCX, TXT (Max 10MB)</p>
                        </div>
                        <input type="file" name="file" id="file" class="hidden" onchange="updateFilenameDisplay(this)" />
                    </label>
                </div>
                <div id="filename-display" class="hidden text-xs font-semibold text-indigo-650 bg-indigo-50 border border-indigo-200/50 px-3 py-2 rounded-lg flex items-center justify-between">
                    <span id="filename-text"></span>
                    <button type="button" class="text-slate-400 hover:text-slate-650" onclick="clearSelectedFile()">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="pt-2 flex items-center space-x-3">
                <button type="submit"
                    class="flex-1 py-3 px-4 bg-gradient-to-r from-indigo-500 to-violet-500 hover:from-indigo-600 hover:to-violet-600 text-white rounded-xl text-sm font-semibold tracking-wide shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/30 transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500/40 text-center">
                    Submit Note
                </button>
                <a href="{% url 'user_app:dashboard' %}"
                    class="px-5 py-3 border border-slate-200 text-slate-700 bg-white hover:bg-slate-50 rounded-xl text-sm font-semibold transition-all duration-150 text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    function updateFilenameDisplay(input) {
        const display = document.getElementById('filename-display');
        const text = document.getElementById('filename-text');
        if (input.files && input.files[0]) {
            text.textContent = `Selected attachment: ${input.files[0].name}`;
            display.classList.remove('hidden');
        }
    }

    function clearSelectedFile() {
        const input = document.getElementById('file');
        const display = document.getElementById('filename-display');
        input.value = '';
        display.classList.add('hidden');
    }
</script>
{% endblock %}
