{% extends 'user_app/base.html' %}

{% block title %}Admin Sign In - FirstPortal{% endblock %}

{% block content %}
<div class="w-full max-w-md animate-slide-in">
    <!-- Decorative background glow for admin portal (amber theme) -->
    <div class="absolute inset-0 bg-gradient-to-tr from-amber-500/5 to-rose-500/5 blur-3xl pointer-events-none rounded-full"></div>

    <div class="backdrop-blur-md bg-white border border-slate-200/80 rounded-3xl p-8 shadow-xl shadow-slate-200/50 relative z-10">
        <!-- Brand / Header Icon -->
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 rounded-2xl bg-amber-500/5 border border-amber-500/20 flex items-center justify-center text-amber-800 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
                </svg>
            </div>
        </div>

        <!-- Header Titles -->
        <div class="text-center mb-8">
            <span class="px-2.5 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest bg-amber-500/10 text-amber-805 border border-amber-500/20">
                Staff Authorization
            </span>
            <h2 class="font-outfit font-extrabold text-3xl text-slate-900 tracking-tight mt-3">Admin Portal</h2>
            <p class="text-slate-500 mt-2 text-sm font-medium">Log in to manage registered users</p>
        </div>

        <!-- Admin Login Form -->
        <form method="POST" action="{% url 'admin_app:login' %}" class="space-y-5">
            {% csrf_token %}
            
            <!-- Username or Email Input -->
            <div class="space-y-1.5">
                <label for="username_or_email" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Admin Username or Email</label>
                <div class="relative rounded-xl shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                        </svg>
                    </div>
                    <input type="text" name="username_or_email" id="username_or_email" required placeholder="admin"
                        class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-450 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 focus:bg-white transition-all duration-200 sm:text-sm font-medium">
                </div>
            </div>

            <!-- Password Input -->
            <div class="space-y-1.5">
                <label for="password" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Password</label>
                <div class="relative rounded-xl shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                        </svg>
                    </div>
                    <input type="password" name="password" id="password" required placeholder="••••••••"
                        class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-450 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 focus:bg-white transition-all duration-200 sm:text-sm font-medium">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full mt-2 py-3 px-4 bg-gradient-to-r from-amber-500 to-rose-500 hover:from-amber-600 hover:to-rose-600 text-white rounded-xl text-sm font-semibold tracking-wider uppercase shadow-lg shadow-amber-500/20 hover:shadow-amber-500/30 transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-amber-500/40">
                Log In as Administrator
            </button>
        </form>

        <!-- Redirect options -->
        <div class="mt-6 pt-5 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-500 font-medium">
                Not an administrator? 
                <a href="{% url 'user_app:login' %}" class="text-indigo-650 font-semibold hover:text-indigo-700 transition-colors duration-150">
                    Sign in to User Portal
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
