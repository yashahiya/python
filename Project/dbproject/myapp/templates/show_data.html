<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show_data</title>
</head>
<body style="background-color: antiquewhite;">
    <h1 style="text-align: center;">Show_data</h1> <hr>
    <!-- {{stdata}} -->
    <!-- {%for i in stdata%}
    {{i.id}}

    {%endfor%} -->

    <table border="2" align="center">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>DOB</th>
            <th>Email</th>
            <th>Address</th>
            <th>Action</th>
        </tr>
        {%for i in stdata%}
        <tr>
            <td>{{i.id}}</td>
            <td>{{i.name}}</td>
            <td>{{i.dob}}</td>
            <td>{{i.email}}</td>
            <td>{{i.address}}</td>
            <td><a href="/update_data/{{i.id}}">Update</a>
            <a href="/deletedata/{{i.id}}">Delete</a></td>
        </tr>
        {%endfor%}
    </table>
    
</body>
