<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup Page</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-lg">

        <!-- Heading -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Create Account</h1>
            <p class="text-gray-500 mt-2">Signup to get started</p>
        </div>

        <!-- Signup Form -->
        <form action="" method="POST" class="space-y-5">
            {%csrf_token%}
            <!-- Full Name -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">
                    Full Name
                </label>
                <input type="text" name="fullname" placeholder="Enter your full name"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500"
                    required />
            </div>

            <!-- Email -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">
                    Email Address
                </label>
                <input type="email" name="email" placeholder="Enter your email"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500"
                    required />
            </div>

            <!-- Mobile -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">
                    Mobile Number
                </label>
                <input type="tel" name="mobile" placeholder="Enter your mobile number"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500"
                    required />
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">
                    Password
                </label>
                <input type="password" name="password" placeholder="Create password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500"
                    required />
            </div>



            <!-- Terms Checkbox -->
            <div class="flex items-start gap-2 text-sm text-gray-600">
                <input type="checkbox" required class="mt-1">
                <p>
                    I agree to the
                    <a href="#" class="text-pink-600 hover:underline">
                        Terms & Conditions
                    </a>
                </p>
            </div>

            <!-- Signup Button -->
            <button type="submit"
                class="w-full bg-pink-600 hover:bg-pink-700 text-white font-semibold py-3 rounded-lg transition duration-300">
                Create Account
            </button>

        </form>

        <!-- Login Link -->
        <p class="text-center text-gray-600 mt-6">
            Already have an account?
            <a href="/" class="text-pink-600 font-semibold hover:underline">
                Login
            </a>
        </p>

    </div>

</body>

</html>
