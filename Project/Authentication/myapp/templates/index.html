<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 to-indigo-600 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

        <!-- Heading -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Welcome Back</h1>
            <p class="text-gray-500 mt-2">Please login to your account</p>
        </div>

        <!-- Login Form -->
        <form action="" method="POST" class="space-y-5">
            {%csrf_token%}
            <!-- Email -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">
                    Email Address
                </label>
                <input type="email" name="email" placeholder="Enter your email"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required />
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">
                    Password
                </label>
                <input type="password" name="password" placeholder="Enter your password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required />
            </div>

            <!-- Remember Me + Forgot Password -->
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-gray-600">
                    <input type="checkbox" class="rounded">
                    Remember Me
                </label>

                <a href="#" class="text-blue-600 hover:underline">
                    Forgot Password?
                </a>
            </div>

            <!-- Login Button -->
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-300">
                Login
            </button>

        </form>

        <!-- Register Link -->
        <p class="text-center text-gray-600 mt-6">
            Don't have an account?
            <a href="/signup" class="text-blue-600 font-semibold hover:underline">
                Register
            </a>
        </p>

    </div>

</body>

</html>
